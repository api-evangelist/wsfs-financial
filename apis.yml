        url: https://www.wsfsbank.com/institutional-services
    description: >-
      WSFS Institutional Services delivers global capital markets access,
      SPV management, and corporate trust services with $30.43B under
      administration as of March 31, 2026. Services are delivered through
      relationship-managed engagements; no public developer API surface.
