description: >-
  WSFS Financial Corporation is a multibillion-dollar financial services company
  headquartered in Wilmington, Delaware. Its primary subsidiary WSFS Bank has
  operated since 1832, making it one of the oldest banks in the United States.
  As of March 31, 2026 the company reported $22.1 billion in assets and
  $97.6 billion in assets under management and administration across 114 offices
  in six states. Business lines include personal banking, small business and
  commercial banking, treasury management, WSFS Mortgage, WSFS Wealth Management,
  Bryn Mawr Trust (acquired 2022), WSFS Institutional Services, and the
  Cash Connect ATM-as-a-service business that provides cash logistics and
  vault cash to independent ATM operators. WSFS does not publish a public
  developer portal, OpenAPI specifications, or SDKs; all APIs are bilateral
  treasury / cash management integrations delivered through Enhanced Business
  Online Banking, ACH/wire file feeds, and the Cash Connect partner portal.
