apis:
  - aid: wsfs-financial:treasury-management
    name: WSFS Treasury Management
    tags:
      - Treasury Management
      - Commercial Banking
      - ACH
      - Wires
    humanURL: https://www.wsfsbank.com/commercial/cash-flow/treasury-management
    properties:
      - type: Documentation
        url: https://www.wsfsbank.com/commercial/cash-flow/treasury-management
    description: >-
      Commercial treasury management surface covering deposit and liquidity
      management, payables, receivables, ACH and wire origination, positive
      pay, and fraud prevention. Delivered through Enhanced Business Online
      Banking Plus with bilateral file integration; no public REST API or
      developer portal is published.
  - aid: wsfs-financial:cash-connect
    name: Cash Connect
    tags:
      - Cash Logistics
      - ATM Services
      - Smart Safe
    humanURL: https://www.wsfsbank.com/cash-connect
    properties:
      - type: Documentation
        url: https://www.wsfsbank.com/cash-connect
      - type: Portal
        url: https://www.cash-connect.com
    description: >-
      Cash Connect is WSFS Bank's ATM-as-a-service and cash logistics business,
      supplying vault cash, smart safe services, and managed services to
      independent ATM operators and retailers. Access to the Cash Connect
      portal is via the partner login at cash-connect.com; no public API,
      OpenAPI specification, or SDK is documented.
  - aid: wsfs-financial:bryn-mawr-trust
    name: Bryn Mawr Trust
    tags:
      - Wealth Management
      - Trust Services
      - Private Banking
    humanURL: https://www.bmt.com
    properties:
      - type: Documentation
        url: https://www.bmt.com
    description: >-
      Bryn Mawr Trust, acquired by WSFS in 2022, provides financial and wealth
      planning, investment management, trust and estate services, private
      banking, and corporate retirement plans. Bryn Mawr Trust manages
      approximately $6.73B; Bryn Mawr Trust Advisors $3.53B AUM and $905M AUA;
      The Bryn Mawr Trust Company of Delaware $56.03B. No developer APIs are
      published.
  - aid: wsfs-financial:institutional-services
    name: WSFS Institutional Services
    tags:
      - Institutional Services
      - Corporate Trust
      - Capital Markets
    humanURL: https://www.wsfsbank.com/institutional-services
    properties:
